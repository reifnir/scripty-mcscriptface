---
- set_fact:
    ansible_user: "{{ lookup('env', 'USER') }}"

- block:
  - name: Check if Homebrew is installed
    ansible.builtin.command:
      cmd: which brew
    register: brew_check
    failed_when: false
    changed_when: false

  - name: Error if Homebrew is not installed
    ansible.builtin.fail:
      msg: |
        Homebrew is not installed. Please install it interactively first by running:
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        
        After installation completes, run this playbook again.
    when: brew_check.rc != 0

  - name: Installing brew tools
    community.general.homebrew:
      name: "{{ item }}"
      state: present
    loop:
      - awscli
      - azure-cli
      - tfenv

  - name: Make current user a sudoer without requiring a password
    become: yes
    community.general.sudoers:
      name: "{{ ansible_user }}-nopasswd"
      user: "{{ ansible_user }}"
      commands: "ALL"
      nopassword: yes
      state: present

  - name: Install kubectl via Homebrew
    community.general.homebrew:
      name: "kubernetes-cli@{{ kubectl_version }}"
      state: present
  - name: Check if kubectl is available
    ansible.builtin.command:
      cmd: which kubectl
    register: kubectl_check
    failed_when: false
    changed_when: false

  - name: Ensure kubectl directory is on user's PATH in ~/.bashrc
    ansible.builtin.lineinfile:
      path: "~/.bashrc"
      line: "export PATH=\"/home/linuxbrew/.linuxbrew/opt/kubernetes-cli@{{ kubectl_version }}/bin:$PATH\""
      create: yes
      insertafter: EOF
    when: kubectl_check.rc != 0

  - name: Upgrade all apt packages
    become: yes
    ansible.builtin.apt:
      upgrade: safe

  - name: Add .NET previews PPA (ppa:dotnet/previews)
    become: yes
    ansible.builtin.apt_repository:
      repo: 'ppa:dotnet/previews'
      state: present
    when: ansible_os_family == "Debian"

  - name: Install misc tools
    become: yes
    ansible.builtin.apt:
      name: "{{ item }}"
      state: present
    loop:
      - jq             # Lightweight and flexible command-line JSON processor
      - zip            # Package and compress (archive) files
      - ncdu           # Disk usage analyzer with an ncurses interface
      - direnv         # Utility to set directory specific environment variables
      - dotnet10       # Install the latest .NET LTS version

  - name: Add direnv hook to bashrc
    ansible.builtin.lineinfile:
      path: "~/.bashrc"
      line: 'eval "$(direnv hook bash)"'
      insertafter: EOF
      state: present

  - name: Configure Git user.name and user.email
    ansible.builtin.git_config:
      name: "{{ item.name }}"
      value: "{{ item.value }}"
      scope: global
    loop:
      - { name: "user.name", value: "{{ git_name }}" }
      - { name: "user.email", value: "{{ git_email }}" }

  - name: Create wsl-assets directory for backup and restoration
    ansible.builtin.file:
      path: "~/wsl-assets"
      state: directory
      mode: '0755'      

  - name: Copy backup-current-directory.sh and restore-to-current-directory.sh to wsl-assets
    ansible.builtin.copy:
      src: "{{ item }}"
      dest: "~/wsl-assets/{{ item }}"
      mode: 0755
    loop:
      - backup-current-directory.sh
      - restore-to-current-directory.sh
